<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>֎🇦🇮 Rakshak - Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a192f, #0a0a2a);
        }
        .auth-card {
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .auth-logo-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            background: linear-gradient(to right, #2a75ff, #00d1b2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-control {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
        }
        .btn-primary {
            background: #2a75ff;
            border: none;
            color: white;
            width: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            cursor: pointer;
        }
        .error-message {
            color: #ff3e41;
            font-size: 0.875rem;
            text-align: center;
        }
        .success-message {
            color: #4caf50;
            font-size: 0.875rem;
            text-align: center;
        }
        .name-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 1rem;
            color: rgba(255,255,255,0.7);
        }
        .auth-footer a {
            color: #2a75ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <span class="auth-logo-text">RAKSHAK</span>
                <h2>Create Account</h2>
            </div>
            
            <form id="registerForm">
                <div class="name-group">
                    <input type="text" id="firstName" class="form-control" placeholder="First Name" required>
                    <input type="text" id="lastName" class="form-control" placeholder="Last Name" required>
                </div>
                <div class="form-group">
                    <input type="email" id="email" class="form-control" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <input type="text" id="company" class="form-control" placeholder="Company (optional)">
                </div>
                <div class="form-group">
                    <input type="password" id="password" class="form-control" placeholder="Password (min 6 characters)" required>
                </div>
                <div class="form-group">
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password" required>
                </div>
                <div id="registerError" class="error-message" style="display: none;"></div>
                <div id="registerSuccess" class="success-message" style="display: none;"></div>
                <button type="submit" class="btn-primary" id="registerBtn">Create Account</button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
                <p><a href="index.html">← Back to homepage</a></p>
            </div>
        </div>
    </div>

    <script>
        async function checkAlreadyLoggedIn() {
            try {
                const res = await fetch('/api/auth/me', { credentials: 'include' });
                if (res.ok) window.location.href = '/dashboard.html';
            } catch(e) {}
        }
        checkAlreadyLoggedIn();
        
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const company = document.getElementById('company').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');
            const registerBtn = document.getElementById('registerBtn');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (!firstName || !lastName || !email || !password) {
                errorDiv.textContent = 'Please fill in all required fields.';
                errorDiv.style.display = 'block';
                return;
            }
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match!';
                errorDiv.style.display = 'block';
                return;
            }
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters.';
                errorDiv.style.display = 'block';
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.innerHTML = 'Creating account...';
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, password, company }),
                    credentials: 'include'
                });
                const data = await response.json();
                if (response.ok) {
                    successDiv.textContent = 'Account created! Redirecting...';
                    successDiv.style.display = 'block';
                    setTimeout(() => { window.location.href = '/dashboard.html'; }, 1500);
                } else {
                    errorDiv.textContent = data.error || 'Registration failed';
                    errorDiv.style.display = 'block';
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = 'Create Account';
                }
            } catch(err) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.style.display = 'block';
                registerBtn.disabled = false;
                registerBtn.innerHTML = 'Create Account';
            }
        });
    </script>
</body>
</html>
