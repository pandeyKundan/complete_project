<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakshak | Enterprise Login</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2a75ff;
            --primary-dark: #1a5bd9;
            --primary-glow: rgba(42, 117, 255, 0.4);
            --secondary: #ff3e41;
            --accent: #00d1b2;
            --accent-glow: rgba(0, 209, 178, 0.3);
            --dark-bg: #0a0c15;
            --darker-bg: #060810;
            --card-bg: rgba(18, 22, 35, 0.95);
            --border-glow: rgba(42, 117, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #a0a8c0;
            --text-muted: #6b7280;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(ellipse at 20% 30%, rgba(42, 117, 255, 0.08), transparent 50%),
                        radial-gradient(ellipse at 80% 70%, rgba(0, 209, 178, 0.05), transparent 50%),
                        var(--darker-bg);
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(42, 117, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(42, 117, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

        .particle-network {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Scanner Line */
        .scanner-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: scanMove 6s linear infinite;
            opacity: 0.5;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes scanMove {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }

        /* Main Container */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-wrapper {
            display: flex;
            max-width: 1300px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(42, 117, 255, 0.2);
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Brand Side */
        .brand-side {
            flex: 1;
            background: linear-gradient(135deg, rgba(42, 117, 255, 0.1), rgba(0, 209, 178, 0.05));
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: 'JetBrains Mono', monospace;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .brand-quote {
            margin-top: auto;
        }

        .brand-quote h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        .brand-quote p {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(42, 117, 255, 0.1);
            border-radius: 50px;
            margin-top: 2rem;
            font-size: 0.8rem;
        }

        /* Form Side */
        .form-side {
            flex: 1;
            padding: 3rem;
        }

        .form-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0.5rem 1rem;
            transition: all 0.3s;
            position: relative;
        }

        .tab-btn.active {
            color: var(--primary);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            color: var(--text-muted);
        }

        .input-field {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(42, 117, 255, 0.2);
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .forgot-link {
            text-align: right;
            margin-top: 0.5rem;
        }

        .forgot-link a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.8rem;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
            padding: 0.9rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(42, 117, 255, 0.3);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .divider span {
            margin: 0 1rem;
        }

        /* Social Login */
        .social-login {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
        }

        .social-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 0.7rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .social-btn:hover {
            background: rgba(42, 117, 255, 0.1);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .social-btn i {
            font-size: 1.1rem;
        }

        /* Enterprise Login Options */
        .enterprise-options {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sso-options {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .sso-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sso-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Password Strength Meter */
        .strength-meter {
            margin-top: 0.5rem;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .strength-text {
            font-size: 0.7rem;
            margin-top: 0.3rem;
            color: var(--text-muted);
        }

        /* Subscription Plans */
        .plan-selector {
            margin: 1rem 0;
        }

        .plan-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .plan-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .plan-btn.active {
            background: rgba(42, 117, 255, 0.2);
            border-color: var(--primary);
        }

        .plan-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .plan-price {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .popular-badge {
            background: var(--accent);
            color: var(--darker-bg);
            font-size: 0.6rem;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            margin-left: 0.5rem;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 968px) {
            .auth-wrapper {
                flex-direction: column;
            }
            .brand-side {
                text-align: center;
            }
            .brand-quote h2 {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .form-side {
                padding: 1.5rem;
            }
            .social-login {
                grid-template-columns: 1fr;
            }
            .plan-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="grid-overlay"></div>
    <canvas id="particleCanvas" class="particle-network"></canvas>
    <div class="scanner-line"></div>

    <div class="auth-container">
        <div class="auth-wrapper">
            <!-- Brand Side -->
            <div class="brand-side">
                <div class="brand-logo">
                    <div class="logo-icon">R</div>
                    <span class="logo-text">RAKSHAK</span>
                </div>
                <div class="brand-quote">
                    <h2>Secure Your<br><span style="color: var(--primary);">Digital Future</span></h2>
                    <p>Enterprise-grade security platform trusted by Fortune 500 companies worldwide.</p>
                    <div class="security-badge">
                        <i class="fas fa-shield-alt" style="color: var(--primary);"></i>
                        <span>SOC 2 Type II Certified</span>
                        <i class="fas fa-check-circle" style="color: var(--success); margin-left: 0.5rem;"></i>
                    </div>
                </div>
            </div>

            <!-- Form Side -->
            <div class="form-side">
                <div class="form-tabs">
                    <button class="tab-btn active" data-tab="login">Sign In</button>
                    <button class="tab-btn" data-tab="register">Create Account</button>
                </div>

                <!-- Login Form -->
                <div class="form-container active" id="loginForm">
                    <div class="input-group">
                        <label class="input-label">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="loginEmail" class="input-field" placeholder="security@company.com">
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="loginPassword" class="input-field" placeholder="Enter your password">
                            <i class="fas fa-eye password-toggle" onclick="togglePassword('loginPassword', this)"></i>
                        </div>
                        <div class="forgot-link">
                            <a href="#">Forgot password?</a>
                        </div>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="rememberMe">
                        <label style="font-size: 0.85rem;">Remember me</label>
                    </div>
                    <button class="btn-primary" onclick="handleLogin(event)">
                        <i class="fas fa-arrow-right-to-bracket"></i> Sign In
                    </button>

                    <div class="divider">
                        <span>Or continue with</span>
                    </div>

                    <div class="social-login">
                        <button class="social-btn" onclick="socialLogin('google')">
                            <i class="fab fa-google"></i> Google
                        </button>
                        <button class="social-btn" onclick="socialLogin('github')">
                            <i class="fab fa-github"></i> GitHub
                        </button>
                        <button class="social-btn" onclick="socialLogin('microsoft')">
                            <i class="fab fa-microsoft"></i> Microsoft
                        </button>
                    </div>

                    <!-- Enterprise SSO Options -->
                    <div class="enterprise-options">
                        <div class="sso-options">
                            <button class="sso-btn" onclick="ssoLogin('okta')">
                                <i class="fas fa-building"></i> Okta SSO
                            </button>
                            <button class="sso-btn" onclick="ssoLogin('azure')">
                                <i class="fab fa-microsoft"></i> Azure AD
                            </button>
                            <button class="sso-btn" onclick="ssoLogin('ping')">
                                <i class="fas fa-id-card"></i> Ping Identity
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Register Form -->
                <div class="form-container" id="registerForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="input-group">
                            <label class="input-label">First Name</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user"></i>
                                <input type="text" id="regFirstName" class="input-field" placeholder="John">
                            </div>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Last Name</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user"></i>
                                <input type="text" id="regLastName" class="input-field" placeholder="Doe">
                            </div>
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="regEmail" class="input-field" placeholder="security@company.com">
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Company</label>
                        <div class="input-wrapper">
                            <i class="fas fa-building"></i>
                            <input type="text" id="regCompany" class="input-field" placeholder="Your Company Name">
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="regPassword" class="input-field" placeholder="Create a strong password">
                            <i class="fas fa-eye password-toggle" onclick="togglePassword('regPassword', this)"></i>
                        </div>
                        <div class="strength-meter">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <div class="strength-text" id="strengthText">Password strength</div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="regConfirmPassword" class="input-field" placeholder="Confirm your password">
                            <i class="fas fa-eye password-toggle" onclick="togglePassword('regConfirmPassword', this)"></i>
                        </div>
                    </div>

                    <!-- Subscription Plans -->
                    <div class="plan-selector">
                        <label class="input-label">Choose Your Plan</label>
                        <div class="plan-buttons">
                            <div class="plan-btn" data-plan="free" onclick="selectPlan('free')">
                                <div class="plan-name">Free</div>
                                <div class="plan-price">$0 / month</div>
                            </div>
                            <div class="plan-btn active" data-plan="pro" onclick="selectPlan('pro')">
                                <div class="plan-name">Pro <span class="popular-badge">POPULAR</span></div>
                                <div class="plan-price">$49 / month</div>
                            </div>
                            <div class="plan-btn" data-plan="enterprise" onclick="selectPlan('enterprise')">
                                <div class="plan-name">Enterprise</div>
                                <div class="plan-price">Custom pricing</div>
                            </div>
                        </div>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="termsCheckbox" required>
                        <label style="font-size: 0.85rem;">I agree to the <a href="#" style="color: var(--primary);">Terms of Service</a> and <a href="#" style="color: var(--primary);">Privacy Policy</a></label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="newsletterCheckbox">
                        <label style="font-size: 0.85rem;">Receive security updates and tips</label>
                    </div>
                    <button class="btn-primary" onclick="handleRegister(event)">
                        <i class="fas fa-rocket"></i> Start Free Trial
                    </button>

                    <div class="divider">
                        <span>Or sign up with</span>
                    </div>

                    <div class="social-login">
                        <button class="social-btn" onclick="socialLogin('google')">
                            <i class="fab fa-google"></i> Google
                        </button>
                        <button class="social-btn" onclick="socialLogin('github')">
                            <i class="fab fa-github"></i> GitHub
                        </button>
                        <button class="social-btn" onclick="socialLogin('linkedin')">
                            <i class="fab fa-linkedin"></i> LinkedIn
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedPlan = 'pro';

        // Particle Network Animation
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        const particles = [];
        for (let i = 0; i < 60; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                radius: Math.random() * 2 + 1
            });
        }
        
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(42, 117, 255, 0.4)`;
                ctx.fill();
                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p.x - p2.x;
                    const dy = p.y - p2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(42, 117, 255, ${0.1 * (1 - dist / 100)})`;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // Tab Switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.dataset.tab;
                document.querySelectorAll('.form-container').forEach(form => form.classList.remove('active'));
                if (tab === 'login') {
                    document.getElementById('loginForm').classList.add('active');
                } else {
                    document.getElementById('registerForm').classList.add('active');
                }
            });
        });

        // Password Toggle
        function togglePassword(fieldId, element) {
            const field = document.getElementById(fieldId);
            if (field.type === 'password') {
                field.type = 'text';
                element.classList.remove('fa-eye');
                element.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                element.classList.remove('fa-eye-slash');
                element.classList.add('fa-eye');
            }
        }

        // Password Strength Checker
        const passwordField = document.getElementById('regPassword');
        if (passwordField) {
            passwordField.addEventListener('input', function() {
                const password = this.value;
                let strength = 0;
                let color = '#ef4444';
                let text = 'Weak';
                if (password.length >= 6) strength++;
                if (password.length >= 10) strength++;
                if (/[A-Z]/.test(password)) strength++;
                if (/[0-9]/.test(password)) strength++;
                if (/[^A-Za-z0-9]/.test(password)) strength++;
                strength = Math.min(strength, 4);
                const percent = strength * 25;
                document.getElementById('strengthFill').style.width = percent + '%';
                if (strength === 0 || strength === 1) { color = '#ef4444'; text = 'Weak'; }
                else if (strength === 2) { color = '#f59e0b'; text = 'Fair'; }
                else if (strength === 3) { color = '#eab308'; text = 'Good'; }
                else { color = '#10b981'; text = 'Strong'; }
                document.getElementById('strengthFill').style.background = color;
                document.getElementById('strengthText').innerHTML = text;
                document.getElementById('strengthText').style.color = color;
            });
        }

        // Select Plan
        function selectPlan(plan) {
            selectedPlan = plan;
            document.querySelectorAll('.plan-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.plan-btn[data-plan="${plan}"]`).classList.add('active');
        }

        // Handle Login with improved error handling and retry logic
        async function handleLogin(event) {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            // Validation
            if (!email || !password) {
                showNotification('❌ Please fill in all fields', 'error');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                showNotification('❌ Please enter a valid email address', 'error');
                return;
            }
            
            if (password.length < 6) {
                showNotification('❌ Password must be at least 6 characters', 'error');
                return;
            }
            
            // Show loading state
            const loginBtn = event.target;
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            loginBtn.disabled = true;
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 second timeout
                
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                    signal: controller.signal,
                    credentials: 'include' // Important for session cookies
                });
                
                clearTimeout(timeoutId);
                const data = await res.json();
                
                if (res.ok) {
                    showNotification('✅ Login successful! Redirecting to dashboard...', 'success');
                    // Store user info in sessionStorage for quick access
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 800);
                } else {
                    // Handle specific error cases
                    if (res.status === 401) {
                        showNotification('❌ Invalid email or password. Please try again.', 'error');
                    } else if (res.status === 429) {
                        showNotification('❌ Too many attempts. Please wait before trying again.', 'error');
                    } else {
                        showNotification(data.error || '❌ Login failed. Please try again.', 'error');
                    }
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    showNotification('⏱️ Request timeout. Please check your connection.', 'error');
                } else if (err.name === 'TypeError') {
                    showNotification('🔌 Cannot connect to server. Please check if backend is running.', 'error');
                } else {
                    console.error('Login error:', err);
                    showNotification('❌ Network error. Please try again.', 'error');
                }
            } finally {
                // Reset button state
                loginBtn.innerHTML = originalText;
                loginBtn.disabled = false;
            }
        }

        // Remember Me functionality
        const rememberCheckbox = document.getElementById('rememberMe');
        if (rememberCheckbox) {
            // Load saved email if exists
            const savedEmail = localStorage.getItem('savedEmail');
            if (savedEmail) {
                document.getElementById('loginEmail').value = savedEmail;
                rememberCheckbox.checked = true;
            }
            
            rememberCheckbox.addEventListener('change', (e) => {
                if (e.target.checked) {
                    const email = document.getElementById('loginEmail').value;
                    if (email) localStorage.setItem('savedEmail', email);
                } else {
                    localStorage.removeItem('savedEmail');
                }
            });
        }

        // Handle Register with improved error handling
        async function handleRegister(event) {
            const firstName = document.getElementById('regFirstName').value.trim();
            const lastName = document.getElementById('regLastName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const company = document.getElementById('regCompany').value.trim();
            const terms = document.getElementById('termsCheckbox').checked;
            
            // Validation
            if (!firstName || !lastName || !email || !password) {
                showNotification('❌ Please fill in all required fields', 'error');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                showNotification('❌ Please enter a valid email address', 'error');
                return;
            }
            
            if (password.length < 6) {
                showNotification('❌ Password must be at least 6 characters', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showNotification('❌ Passwords do not match', 'error');
                return;
            }
            
            if (!terms) {
                showNotification('❌ Please accept the Terms of Service', 'error');
                return;
            }
            
            // Show loading state
            const registerBtn = event.target;
            const originalText = registerBtn.innerHTML;
            registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
            registerBtn.disabled = true;
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, password, company, plan: selectedPlan }),
                    signal: controller.signal,
                    credentials: 'include'
                });
                
                clearTimeout(timeoutId);
                const data = await res.json();
                
                if (res.ok) {
                    showNotification('✅ Account created successfully! Redirecting to dashboard...', 'success');
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 800);
                } else {
                    if (res.status === 409) {
                        showNotification('❌ Email already registered. Please use a different email or login.', 'error');
                    } else if (res.status === 400) {
                        showNotification(data.error || '❌ Invalid registration data', 'error');
                    } else {
                        showNotification(data.error || '❌ Registration failed. Please try again.', 'error');
                    }
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    showNotification('⏱️ Request timeout. Please check your connection.', 'error');
                } else {
                    showNotification('❌ Network error. Please try again.', 'error');
                }
            } finally {
                registerBtn.innerHTML = originalText;
                registerBtn.disabled = false;
            }
        }

        // Social Login
        function socialLogin(provider) {
            showNotification(`Redirecting to ${provider} authentication...`, 'info');
            setTimeout(() => {
                window.location.href = `/api/auth/${provider}`;
            }, 1000);
        }

        // SSO Login
        function ssoLogin(provider) {
            showNotification(`Redirecting to ${provider} SSO...`, 'info');
            setTimeout(() => {
                window.location.href = `/api/auth/sso/${provider}`;
            }, 1000);
        }

        // Show Notification
        function showNotification(message, type) {
            const colors = {
                success: '#10b981',
                error: '#ef4444',
                info: '#3b82f6'
            };
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.style.borderColor = colors[type];
            notification.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 4000);
        }
    </script>
</body>
</html>
