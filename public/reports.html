<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakshak | Security Reports & Analytics</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2a75ff;
            --primary-dark: #1a5bd9;
            --primary-glow: rgba(42, 117, 255, 0.4);
            --secondary: #ff3e41;
            --accent: #00d1b2;
            --accent-glow: rgba(0, 209, 178, 0.3);
            --dark-bg: #0a0c15;
            --darker-bg: #060810;
            --card-bg: rgba(18, 22, 35, 0.95);
            --border-glow: rgba(42, 117, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #a0a8c0;
            --text-muted: #6b7280;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --critical: #dc2626;
            --high: #f97316;
            --medium: #fbbf24;
            --low: #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(ellipse at 20% 30%, rgba(42, 117, 255, 0.08), transparent 50%),
                        radial-gradient(ellipse at 80% 70%, rgba(0, 209, 178, 0.05), transparent 50%),
                        var(--darker-bg);
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(42, 117, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(42, 117, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

        .scanner-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: scanMove 6s linear infinite;
            opacity: 0.5;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes scanMove {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }

        /* Header & Sidebar */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 0.8rem 2rem;
            background: rgba(6, 8, 16, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(42, 117, 255, 0.2);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: 'JetBrains Mono', monospace;
        }

        .logo-text {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-menu {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-menu a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: var(--primary);
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            position: relative;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .user-role {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 0.5rem;
            min-width: 150px;
            display: none;
            z-index: 1000;
        }

        .dropdown.active .dropdown-menu {
            display: block;
        }

        .dropdown-menu a {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .dropdown-menu a:hover {
            background: rgba(42, 117, 255, 0.1);
            color: var(--primary);
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 65px;
            width: 260px;
            height: calc(100vh - 65px);
            background: rgba(6, 8, 16, 0.9);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(42, 117, 255, 0.1);
            padding: 1.5rem 0;
            overflow-y: auto;
            z-index: 99;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-item {
            margin-bottom: 0.3rem;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.7rem 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s;
            position: relative;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            color: var(--primary);
            background: rgba(42, 117, 255, 0.1);
        }

        .sidebar-link.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: var(--primary);
        }

        .badge {
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: auto;
        }

        .main-content {
            margin-left: 260px;
            margin-top: 65px;
            padding: 2rem;
            min-height: calc(100vh - 65px);
        }

        /* Reports Container */
        .reports-header {
            margin-bottom: 2rem;
        }

        .reports-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .reports-header p {
            color: var(--text-secondary);
        }

        /* Filter Bar */
        .filter-bar {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .filter-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .filter-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            color: white;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(42, 117, 255, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-secondary);
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Report Cards Grid */
        .reports-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .report-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.2rem;
            transition: all 0.3s;
            cursor: pointer;
        }

        .report-card:hover {
            transform: translateY(-3px);
            border-color: rgba(42, 117, 255, 0.3);
            box-shadow: 0 10px 30px rgba(42, 117, 255, 0.1);
        }

        .report-card.critical { border-left: 3px solid var(--critical); }
        .report-card.high { border-left: 3px solid var(--high); }
        .report-card.medium { border-left: 3px solid var(--medium); }
        .report-card.low { border-left: 3px solid var(--low); }

        .report-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
        }

        .report-type {
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            background: rgba(42, 117, 255, 0.1);
            border-radius: 20px;
            color: var(--primary);
        }

        .report-date {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .report-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .report-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .report-stats {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .stat-chip {
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
        }

        .stat-chip.critical { background: rgba(220, 38, 38, 0.2); color: var(--critical); }
        .stat-chip.high { background: rgba(249, 115, 22, 0.2); color: var(--high); }
        .stat-chip.medium { background: rgba(251, 191, 36, 0.2); color: var(--medium); }

        /* Report Detail Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 2000;
            overflow-y: auto;
        }

        .modal-content {
            max-width: 1200px;
            margin: 2rem auto;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .export-buttons {
            display: flex;
            gap: 0.5rem;
        }

        /* Report Preview Sections */
        .report-section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .summary-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }

        .summary-value {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .summary-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }

        .charts-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 1rem;
        }

        .vulnerability-table {
            width: 100%;
            border-collapse: collapse;
        }

        .vulnerability-table th,
        .vulnerability-table td {
            padding: 0.8rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .vulnerability-table th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.8rem;
        }

        .severity-badge {
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .severity-critical { background: rgba(220, 38, 38, 0.2); color: var(--critical); }
        .severity-high { background: rgba(249, 115, 22, 0.2); color: var(--high); }
        .severity-medium { background: rgba(251, 191, 36, 0.2); color: var(--medium); }
        .severity-low { background: rgba(34, 197, 94, 0.2); color: var(--low); }

        .recommendation-list {
            list-style: none;
            padding-left: 0;
        }

        .recommendation-list li {
            padding: 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            .sidebar.active {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 1rem;
            }
            .summary-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts-row {
                grid-template-columns: 1fr;
            }
            .reports-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="grid-overlay"></div>
    <div class="scanner-line"></div>

    <!-- Header -->
    <header class="header">
        <div class="logo">
            <div class="logo-icon">R</div>
            <span class="logo-text">RAKSHAK</span>
        </div>
        <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="scanner.html">Scanner</a></li>
            <li><a href="reports.html" class="active">Reports</a></li>
            <li><a href="vulnerabilities.html">Vulnerabilities</a></li>
        </ul>
        <div class="user-menu dropdown" id="userDropdown">
            <div class="user-avatar"><i class="fas fa-user"></i></div>
            <div class="user-info">
                <span class="user-name" id="userName">Loading...</span>
                <span class="user-role">Security Analyst</span>
            </div>
            <i class="fas fa-chevron-down"></i>
            <div class="dropdown-menu">
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <ul class="sidebar-menu">
            <li class="sidebar-item"><a href="dashboard.html" class="sidebar-link"><i class="fas fa-home"></i><span>Overview</span></a></li>
            <li class="sidebar-item"><a href="scanner.html" class="sidebar-link"><i class="fas fa-search"></i><span>Security Scanner</span></a></li>
            <li class="sidebar-item"><a href="vulnerabilities.html" class="sidebar-link"><i class="fas fa-bug"></i><span>Vulnerabilities</span></a></li>
            <li class="sidebar-item"><a href="reports.html" class="sidebar-link active"><i class="fas fa-chart-bar"></i><span>Reports</span></a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="reports-header">
            <h1>Security Reports & Analytics</h1>
            <p>Comprehensive security analysis and compliance reporting</p>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="filter-group">
                <select id="reportTypeFilter" class="filter-select">
                    <option value="all">All Report Types</option>
                    <option value="scan">Scan Reports</option>
                    <option value="weekly">Weekly Reports</option>
                    <option value="monthly">Monthly Reports</option>
                    <option value="compliance">Compliance Reports</option>
                </select>
                <select id="severityFilter" class="filter-select">
                    <option value="all">All Severities</option>
                    <option value="critical">Critical Only</option>
                    <option value="high">High & Critical</option>
                    <option value="medium">Medium & Above</option>
                </select>
            </div>
            <button class="btn-primary" onclick="generateNewReport()">
                <i class="fas fa-plus"></i> Generate New Report
            </button>
        </div>

        <!-- Reports Grid -->
        <div id="reportsGrid" class="reports-grid">
            <div style="grid-column: 1/-1; text-align: center; padding: 2rem;">
                <div class="loading-spinner"></div> Loading reports...
            </div>
        </div>
    </main>

    <!-- Report Detail Modal -->
    <div id="reportModal" class="modal">
        <div class="modal-content" id="modalContent">
            <!-- Content dynamically populated -->
        </div>
    </div>

    <script>
        let allReports = [];
        let currentReport = null;
        let trendChart = null;
        let severityChart = null;

        // Helper Functions
        async function fetchJSON(url, options = {}) {
            const res = await fetch(url, options);
            if (!res.ok) {
                const err = await res.json().catch(() => ({ error: 'Request failed' }));
                throw new Error(err.error || `HTTP ${res.status}`);
            }
            return res.json();
        }

        async function checkAuth() {
            try {
                const data = await fetchJSON('/api/auth/me');
                document.getElementById('userName').innerText = data.user.first_name + ' ' + data.user.last_name;
                return true;
            } catch (err) {
                window.location.href = '/login.html';
                return false;
            }
        }

        // Load Reports
        async function loadReports() {
            try {
                const reports = await fetchJSON('/api/reports');
                allReports = reports;
                renderReports();
            } catch (err) {
                console.error('Failed to load reports:', err);
                document.getElementById('reportsGrid').innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:2rem;">Failed to load reports. Generate one first!</div>';
            }
        }

        // Render Reports Grid
        function renderReports() {
            const container = document.getElementById('reportsGrid');
            const typeFilter = document.getElementById('reportTypeFilter').value;
            const severityFilter = document.getElementById('severityFilter').value;

            let filtered = [...allReports];
            if (typeFilter !== 'all') {
                filtered = filtered.filter(r => r.report_type === typeFilter);
            }

            if (filtered.length === 0) {
                container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:2rem;">No reports found. Generate a new report to get started!</div>';
                return;
            }

            container.innerHTML = '';
            filtered.forEach(report => {
                let severityClass = 'medium';
                if (report.content && report.content.summary) {
                    if (report.content.summary.critical > 0) severityClass = 'critical';
                    else if (report.content.summary.high > 0) severityClass = 'high';
                    else if (report.content.summary.medium > 0) severityClass = 'medium';
                    else severityClass = 'low';
                }

                const card = document.createElement('div');
                card.className = `report-card ${severityClass}`;
                card.onclick = () => showReportDetail(report.id);
                card.innerHTML = `
                    <div class="report-header">
                        <span class="report-type">${report.report_type?.toUpperCase() || 'SCAN'}</span>
                        <span class="report-date">${new Date(report.generated_at).toLocaleString()}</span>
                    </div>
                    <h3 class="report-title">${escapeHtml(report.title)}</h3>
                    <p class="report-desc">${report.content?.scan?.targetUrl ? `Target: ${escapeHtml(report.content.scan.targetUrl)}` : 'Security analysis report'}</p>
                    <div class="report-stats">
                        ${report.content?.summary ? `
                            ${report.content.summary.critical > 0 ? `<span class="stat-chip critical">${report.content.summary.critical} Critical</span>` : ''}
                            ${report.content.summary.high > 0 ? `<span class="stat-chip high">${report.content.summary.high} High</span>` : ''}
                            ${report.content.summary.medium > 0 ? `<span class="stat-chip medium">${report.content.summary.medium} Medium</span>` : ''}
                        ` : '<span>No vulnerabilities found</span>'}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Show Report Detail
        async function showReportDetail(reportId) {
            try {
                const report = await fetchJSON(`/api/reports/${reportId}`);
                currentReport = report;
                const modal = document.getElementById('reportModal');
                const modalContent = document.getElementById('modalContent');
                
                const content = report.content || {};
                const summary = content.summary || { total: 0, critical: 0, high: 0, medium: 0, low: 0 };
                const vulnerabilities = content.vulnerabilities || [];
                const securityScore = content.scan?.securityScore || 85;

                modalContent.innerHTML = `
                    <div class="modal-header">
                        <h2><i class="fas fa-chart-line"></i> ${escapeHtml(report.title)}</h2>
                        <div class="export-buttons">
                            <button class="btn-outline" onclick="exportReportAsPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
                            <button class="btn-outline" onclick="exportReportAsJSON()"><i class="fas fa-file-code"></i> JSON</button>
                            <button class="btn-outline" onclick="exportReportAsCSV()"><i class="fas fa-file-csv"></i> CSV</button>
                            <button class="close-modal" onclick="closeReportModal()">&times;</button>
                        </div>
                    </div>

                    <!-- Executive Summary -->
                    <div class="report-section">
                        <div class="section-title">
                            <i class="fas fa-microphone-alt" style="color: var(--primary);"></i>
                            <h3>Executive Summary</h3>
                        </div>
                        <div class="summary-stats">
                            <div class="summary-card">
                                <div class="summary-value" style="color: ${securityScore > 70 ? 'var(--success)' : securityScore > 40 ? 'var(--warning)' : 'var(--danger)'}">${securityScore}%</div>
                                <div class="summary-label">Security Score</div>
                            </div>
                            <div class="summary-card">
                                <div class="summary-value">${summary.total || 0}</div>
                                <div class="summary-label">Total Vulnerabilities</div>
                            </div>
                            <div class="summary-card">
                                <div class="summary-value" style="color: var(--critical);">${summary.critical || 0}</div>
                                <div class="summary-label">Critical Issues</div>
                            </div>
                            <div class="summary-card">
                                <div class="summary-value">${content.scan?.scanType || 'Standard'}</div>
                                <div class="summary-label">Scan Type</div>
                            </div>
                        </div>
                        <p style="color: var(--text-secondary); line-height: 1.6;">
                            ${summary.total > 0 ? `This security assessment identified ${summary.total} vulnerabilities including ${summary.critical} critical and ${summary.high} high severity issues.` : 'Great news! No vulnerabilities were detected in this security assessment.'}
                            ${content.scan?.targetUrl ? ` The target scanned was <strong>${escapeHtml(content.scan.targetUrl)}</strong>.` : ''}
                        </p>
                    </div>

                    <!-- Charts Row -->
                    <div class="charts-row">
                        <div class="chart-box">
                            <canvas id="severityDistributionChart"></canvas>
                        </div>
                        <div class="chart-box">
                            <canvas id="trendAnalysisChart"></canvas>
                        </div>
                    </div>

                    <!-- Vulnerabilities Table -->
                    <div class="report-section">
                        <div class="section-title">
                            <i class="fas fa-bug" style="color: var(--warning);"></i>
                            <h3>Detected Vulnerabilities</h3>
                        </div>
                        ${vulnerabilities.length > 0 ? `
                            <table class="vulnerability-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Vulnerability</th>
                                        <th>Severity</th>
                                        <th>Location</th>
                                        <th>CVSS Score</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${vulnerabilities.map((v, idx) => `
                                        <tr>
                                            <td>VULN-${String(idx+1).padStart(3,'0')}</td>
                                            <td>${escapeHtml(v.title)}</td>
                                            <td><span class="severity-badge severity-${v.severity}">${v.severity.toUpperCase()}</span></td>
                                            <td><code style="font-size:0.7rem;">${escapeHtml(v.location || 'N/A')}</code></td>
                                            <td>${v.cvss || 'N/A'}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        ` : '<p style="color: var(--success);">✅ No vulnerabilities detected in this scan.</p>'}
                    </div>

                    <!-- Recommendations -->
                    <div class="report-section">
                        <div class="section-title">
                            <i class="fas fa-lightbulb" style="color: var(--accent);"></i>
                            <h3>Remediation Recommendations</h3>
                        </div>
                        <ul class="recommendation-list">
                            ${vulnerabilities.length > 0 ? 
                                [...new Set(vulnerabilities.map(v => v.remediation).filter(r => r))].slice(0, 8).map(rec => `
                                    <li><i class="fas fa-check-circle" style="color: var(--success);"></i> ${escapeHtml(rec)}</li>
                                `).join('') : 
                                '<li><i class="fas fa-check-circle" style="color: var(--success);"></i> Your application appears secure. Continue regular security monitoring.</li>'
                            }
                        </ul>
                    </div>

                    <!-- Metadata -->
                    <div class="report-section">
                        <div class="section-title">
                            <i class="fas fa-info-circle" style="color: var(--text-muted);"></i>
                            <h3>Report Metadata</h3>
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; font-size: 0.8rem; color: var(--text-muted);">
                            <div>Generated: ${new Date(report.generated_at).toLocaleString()}</div>
                            <div>Report ID: ${report.id}</div>
                            <div>Type: ${report.report_type || 'Security Report'}</div>
                            <div>Format: Comprehensive Security Analysis</div>
                        </div>
                    </div>
                `;

                modal.style.display = 'block';
                
                // Initialize charts after modal is open
                setTimeout(() => {
                    initReportCharts(summary);
                }, 100);
            } catch (err) {
                console.error('Failed to load report detail:', err);
                alert('Failed to load report details');
            }
        }

        // Initialize Charts in Modal
        function initReportCharts(summary) {
            const severityCtx = document.getElementById('severityDistributionChart');
            if (severityCtx && severityChart) severityChart.destroy();
            if (severityCtx) {
                severityChart = new Chart(severityCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Critical', 'High', 'Medium', 'Low'],
                        datasets: [{
                            data: [summary.critical || 0, summary.high || 0, summary.medium || 0, summary.low || 0],
                            backgroundColor: ['#dc2626', '#f97316', '#fbbf24', '#22c55e']
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom', labels: { color: '#a0a8c0' } } } }
                });
            }

            const trendCtx = document.getElementById('trendAnalysisChart');
            if (trendCtx && trendChart) trendChart.destroy();
            if (trendCtx) {
                trendChart = new Chart(trendCtx, {
                    type: 'line',
                    data: {
                        labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                        datasets: [{
                            label: 'Vulnerabilities Detected',
                            data: [12, 9, 7, summary.total || 5],
                            borderColor: '#2a75ff',
                            backgroundColor: 'rgba(42, 117, 255, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#a0a8c0' } } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#a0a8c0' } }, x: { ticks: { color: '#a0a8c0' } } } }
                });
            }
        }

        // Export Functions
        async function exportReportAsPDF() {
            if (!currentReport) return;
            const element = document.getElementById('modalContent');
            const opt = { margin: 0.5, filename: `security_report_${currentReport.id}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
            html2pdf().set(opt).from(element).save();
        }

        function exportReportAsJSON() {
            if (!currentReport) return;
            const dataStr = JSON.stringify(currentReport, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `report_${currentReport.id}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function exportReportAsCSV() {
            if (!currentReport) return;
            const content = currentReport.content || {};
            const vulnerabilities = content.vulnerabilities || [];
            const headers = ['ID', 'Title', 'Severity', 'Location', 'Description', 'Remediation'];
            const rows = vulnerabilities.map((v, idx) => [idx + 1, v.title, v.severity, v.location || '', v.description || '', v.remediation || '']);
            const csvContent = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `report_${currentReport.id}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Generate New Report
        async function generateNewReport() {
            try {
                const scans = await fetchJSON('/api/scans');
                const completedScans = scans.filter(s => s.status === 'completed');
                if (completedScans.length === 0) {
                    alert('No completed scans found. Please run a scan first from the Scanner page.');
                    window.location.href = '/scanner.html';
                    return;
                }
                const scan = completedScans[0];
                const title = prompt('Enter report title:', `Security Report - ${new Date().toLocaleDateString()}`);
                if (!title) return;
                await fetchJSON('/api/reports/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scanId: scan.id, reportType: 'scan', title })
                });
                alert('Report generated successfully!');
                await loadReports();
            } catch (err) {
                alert('Failed to generate report: ' + err.message);
            }
        }

        function closeReportModal() {
            document.getElementById('reportModal').style.display = 'none';
            if (severityChart) severityChart.destroy();
            if (trendChart) trendChart.destroy();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
        }

        // Logout
        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login.html';
        }

        // Event Listeners
        document.getElementById('userDropdown').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('userDropdown').classList.toggle('active');
        });
        document.addEventListener('click', () => {
            document.getElementById('userDropdown').classList.remove('active');
        });
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('reportTypeFilter').addEventListener('change', renderReports);
        document.getElementById('severityFilter').addEventListener('change', renderReports);

        // Mobile Sidebar Toggle
        const sidebar = document.getElementById('sidebar');
        const mobileMenuBtn = document.createElement('button');
        mobileMenuBtn.innerHTML = '<i class="fas fa-bars"></i>';
        mobileMenuBtn.style.cssText = 'position:fixed; bottom:20px; left:20px; background:var(--primary); border:none; color:white; width:45px; height:45px; border-radius:50%; z-index:100; cursor:pointer; display:none;';
        document.body.appendChild(mobileMenuBtn);
        
        if (window.innerWidth <= 768) {
            mobileMenuBtn.style.display = 'flex';
            mobileMenuBtn.addEventListener('click', () => sidebar.classList.toggle('active'));
        }
        window.addEventListener('resize', () => {
            if (window.innerWidth <= 768) mobileMenuBtn.style.display = 'flex';
            else mobileMenuBtn.style.display = 'none';
        });

        // Initialize
        checkAuth().then(() => loadReports());
    </script>
</body>
</html>
